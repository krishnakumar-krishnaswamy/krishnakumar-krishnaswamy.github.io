name: Portfolio Git Quality Check one

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Required Files (V1)
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js

      - name: Validate HTML (V2)
        run: |
          npm install -g htmlhint
          htmlhint index.html
          
      - name: Success
        run: echo "V1 completed successfully."
