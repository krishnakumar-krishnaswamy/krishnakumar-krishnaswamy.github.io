# -----------------------------------------------------------------------------
# Portfolio Git Quality Check
#
# Version: V1
#
# Purpose:
# Continuous Integration (CI) workflow that validates the portfolio repository
# after every commit to the main branch.
#
# Current Validation:
# - Repository checkout
# - Required file existence verification
#
# - V2 - HTML validation
#
# Purpose:
# Detect malformed HTML before deployment.
#
# - V5 - Broken link detection
#
# Purpose: Ensure portfolio navigation and external references remain functional.
#
# Planned Enhancements:
# V3 - CSS validation
# V4 - JavaScript validation
# -----------------------------------------------------------------------------

name: Portfolio Git Quality Check

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Verify Required Files (V1)
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js

      - name: Validate HTML (V2)
        run: |
          npm install -g htmlhint
          htmlhint index.html

      - name: Broken Link Detection (V5)
        run: |
          npm install -g broken-link-checker
          blc file://$(pwd)/index.html -ro

      - name: Success
        run: echo "Portfolio validation completed successfully."
