name: Portfolio Git Quality Check

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Verify Required Files
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js

      - name: Success
        run: echo "Portfolio validation completed successfully."
