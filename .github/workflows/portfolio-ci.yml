# -----------------------------------------------------------------------------
# Portfolio Git Quality Check
#
# Purpose:
# Continuous Integration (CI) workflow that validates the portfolio repository
# after every commit to the main branch.
#
# Current Validation
# V1 - Required file existence verification
# V2 - HTML validation
# V5 - Broken link detection
#
# Planned Enhancements
# V3 - CSS validation
# V4 - JavaScript validation
# -----------------------------------------------------------------------------

name: Portfolio Git Quality Check

on:
  push:
    branches:
      - main

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:

      # -------------------------------------------------
      # Checkout Repository
      # -------------------------------------------------
      - name: Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------
      # Setup Node.js
      # -------------------------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # -------------------------------------------------
      # V1 - Verify Required Files
      # -------------------------------------------------
      - name: Verify Required Files (V1)
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js

      # -------------------------------------------------
      # V2 - Validate HTML
      # -------------------------------------------------
      - name: Validate HTML (V2)
        run: |
          npm install -g htmlhint
          htmlhint index.html

      # -------------------------------------------------
      # V3 - CSS Validation
      # -------------------------------------------------
      - name: Validate CSS (V3)
        run: |
          npm install -g stylelint stylelint-config-standard

          cat <<EOF > .stylelintrc.json
          {
            "extends": "stylelint-config-standard"
          }
          EOF

          stylelint styles.css

      # -------------------------------------------------
      # V5 - Broken Link Detection
      # -------------------------------------------------
      - name: Broken Link Detection (V5)
        run: |
          npm install -g broken-link-checker
          blc https://krishnakumar-krishnaswamy.github.io -ro

      # -------------------------------------------------
      # Success
      # -------------------------------------------------
      - name: Success
        run: echo "Portfolio validation completed successfully."
