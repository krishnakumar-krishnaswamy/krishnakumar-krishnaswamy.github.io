# -----------------------------------------------------------------------------
# Portfolio Continuous Integration (CI)
#
# Version
# V1 - Repository Integrity Validation
# V2 - HTML Validation
# V3 - CSS Integrity Validation
# V5 - Live Website Link Validation
#
# Purpose
# Continuous Integration (CI) workflow that automatically validates the
# portfolio repository after every commit to the main branch.
#
# This workflow provides automated quality assurance before the portfolio
# is published through GitHub Pages.
#
# -----------------------------------------------------------------------------


name: Portfolio Continuous Integration (CI)

on:
  push:
    branches:
      - main

jobs:

  validate:

    runs-on: ubuntu-latest

    steps:

      # -----------------------------------------------------------------------
      # Checkout Repository
      #
      # Downloads the latest repository contents into the temporary GitHub
      # Actions runner so subsequent validation steps can inspect the files.
      #
      # Official GitHub Action
      # https://github.com/actions/checkout
      # -----------------------------------------------------------------------

      - name: Checkout Repository
        uses: actions/checkout@v4


      # -----------------------------------------------------------------------
      # Setup Node.js Runtime
      #
      # Required because HTMLHint and Broken Link Checker are Node packages.
      #
      # Official GitHub Action
      # https://github.com/actions/setup-node
      # -----------------------------------------------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4

        with:
          node-version: 20


      # -----------------------------------------------------------------------
      # V1 – Repository Integrity Validation
      #
      # Commands
      #   test -f
      #
      # Purpose
      #
      # Verifies that the portfolio's three primary application files exist.
      #
      # Required Files
      #   • index.html
      #   • styles.css
      #   • app.js
      #
      # Prevents accidental deletion or incomplete commits.
      # -----------------------------------------------------------------------

      - name: Verify Required Files (V1)
        run: |
          test -f index.html
          test -f styles.css
          test -f app.js


      # -----------------------------------------------------------------------
      # V2 – HTML Validation
      #
      # Tool
      #   HTMLHint
      #
      # Commands
      #   npm install -g htmlhint
      #   htmlhint index.html
      #
      # Purpose
      #
      # Detects malformed HTML such as
      #
      #   • missing closing tags
      #   • invalid nesting
      #   • structural HTML errors
      #
      # Ensures the portfolio homepage conforms to valid HTML.
      # -----------------------------------------------------------------------

      - name: Validate HTML (V2)
        run: |
          npm install -g htmlhint
          htmlhint index.html


      # -----------------------------------------------------------------------
      # V3 – CSS Integrity Validation
      #
      # Commands
      #   test -s
      #   grep -q
      #
      # Purpose
      #
      # Performs lightweight validation without enforcing formatting rules.
      #
      # Checks
      #
      #   • styles.css exists and is not empty
      #   • body selector exists
      #   • sidebar component exists
      #   • card component exists
      #
      # Helps detect accidental overwrites or removal of core UI components.
      # -----------------------------------------------------------------------

      - name: Validate CSS Integrity (V3)
        run: |
          test -s styles.css
          grep -q "body" styles.css
          grep -q ".sidebar" styles.css
          grep -q ".card" styles.css

      # -----------------------------------------------------------------------
      # V4 – JavaScript Syntax Validation
      #
      # Tool
      #   Node.js JavaScript Parser
      #
      # Command
      #   node --check app.js
      #
      # Purpose
      #
      # Verifies that the JavaScript source file contains valid syntax.
      #
      # Detects errors such as
      #
      #   • Missing brackets
      #   • Missing parentheses
      #   • Missing braces
      #   • Invalid JavaScript syntax
      #
      # Does not execute the program or enforce formatting rules.
      # -----------------------------------------------------------------------

      - name: Validate JavaScript Syntax (V4)
        run: |
          node --check app.js

      # -----------------------------------------------------------------------
      # V5 – Live Website Link Validation
      #
      # Tool
      #   Broken Link Checker (BLC)
      #
      # Commands
      #   npm install -g broken-link-checker
      #   blc https://krishnakumar-krishnaswamy.github.io -ro
      #
      # Purpose
      #
      # Validates hyperlinks on the LIVE GitHub Pages website.
      #
      # Option Flags
      #
      #   -r
      #       Recursively crawls all reachable pages starting from the homepage.
      #
      #   -o
      #       Produces ordered output for easier review.
      #
      # Validation includes
      #
      #   • Internal portfolio navigation
      #   • Project links
      #   • GitHub profile
      #   • LinkedIn profile
      #   • Credly profile
      #   • Any additional hyperlinks reachable from the homepage
      #
      # Detects broken or unreachable links after deployment.
      # -----------------------------------------------------------------------

      - name: Broken Link Detection (V5)
        run: |
          npm install -g broken-link-checker
          blc https://krishnakumar-krishnaswamy.github.io -ro


      # -----------------------------------------------------------------------
      # Workflow Completed
      # -----------------------------------------------------------------------

      - name: Success
        run: echo "Portfolio CI validation completed successfully."
