<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FN-LN Portfolio</title>

  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">

    <div class="brand">
      FN-LN
    </div>

    <!-- PROJECT DROPDOWN -->
    <div class="dropdown">

      <button class="dropdown-btn" onclick="toggleDropdown()">
        Projects ▾
      </button>

      <div class="dropdown-content" id="dropdown">

        <button class="nav-btn" onclick="loadProject('healthcare')">
          Project 1 - Healthcare Research
        </button>

        <button class="nav-btn" onclick="loadProject('project2')">
          Project 2 - IT Readiness Agent
        </button>

      </div>

    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="main">

    <div class="top-bar" id="guide">
      Select a project from the left to view usage guide.
    </div>

    <div class="content">

      <h2>Interactive Output Area</h2>

      <div id="output">
        Welcome! Choose a project to begin.
      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
