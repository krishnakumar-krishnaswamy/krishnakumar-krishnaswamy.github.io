<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FN-LN Portfolio</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<!-- TOP HEADER -->
<div class="top-header">
  <div class="title">FN LN Portfolio</div>
</div>

<!-- MAIN LAYOUT -->
<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">

    <!-- PROJECT GROUP -->
    <div class="project-list">

      <button class="nav-btn" onclick="loadProject('project1')">
        Project 1
      </button>

      <button class="nav-btn" onclick="loadProject('project2')">
        Project 2
      </button>

      <button class="nav-btn" onclick="loadProject('project3')">
        Project 3
      </button>

    </div>

    <!-- BOTTOM ACTION (CHATGPT STYLE) -->
    <div class="sidebar-bottom">

      <button class="contact-btn" onclick="loadContact()">
        Contact
      </button>

    </div>

  </div>

  <!-- RIGHT PANEL -->
  <div class="main">
    <div id="output"></div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
