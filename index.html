<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FN-LN Portfolio</title>
  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<div class="top-header">FN LN Portfolio</div>

<div class="layout">

  <div class="sidebar">

    <div class="project-list">
      <button id="btn-project1" class="nav-btn" onclick="loadProject('project1')">Project 1</button>
      <button id="btn-project2" class="nav-btn" onclick="loadProject('project2')">Project 2</button>
      <button id="btn-project3" class="nav-btn" onclick="loadProject('project3')">Project 3</button>
    </div>

    <div class="contact-list">
      <button id="btn-contact" class="nav-btn" onclick="loadContact()">Contact</button>
    </div>

  </div>

  <!-- IMPORTANT: fixed structure -->
  <div class="main">

    <div class="top-zone" id="projectTitle"></div>

    <div class="center-zone" id="centerContent"></div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
