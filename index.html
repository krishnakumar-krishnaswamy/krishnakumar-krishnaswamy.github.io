<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>FN-LN Portfolio</title>

  <link rel="stylesheet" href="styles.css"/>
</head>

<body>

<div class="layout">

  <!-- LEFT SIDEBAR -->
  <div class="sidebar">

    <!-- TOP BRAND -->
    <div class="brand">
      FN-LN
    </div>

    <!-- SPACING -->
    <div style="height: 30px;"></div>

    <!-- PROJECTS -->
    <button class="nav-btn" onclick="loadProject('project1')">
      Project 1
    </button>

    <button class="nav-btn" onclick="loadProject('project2')">
      Project 2
    </button>

    <button class="nav-btn" onclick="loadProject('project3')">
      Project 3
    </button>

  </div>

  <!-- RIGHT PANEL -->
  <div class="main">

    <div class="top-bar" id="guide">
      Select a project from the left to view details.
    </div>

    <div class="content">

      <h2>Interactive Output Area</h2>

      <div id="output">
        Welcome! Choose a project to begin.
      </div>

    </div>

  </div>

</div>

<script src="app.js"></script>

</html>
